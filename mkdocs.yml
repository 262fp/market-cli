site_name: Fundamentos de Programación - Libro digital
site_description: Guías de programación en Python convertidas a libro digital con MkDocs.
site_author: UPeU
copyright: Angel Sullon @asullom - UPeU 2026

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: blue grey
      accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true
      ignore_h1_titles: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid.js

nav:
  - Inicio: index.md
  - Proyecto Integrador:
      - Guía del proyecto: proyecto-sello/index.md
      - Productos por unidad: productos.md
  - Sílabos:
      - Sílabo 2026-1: silabo_fp_2026_1.md
      - Sílabo 2026-2: silabo_fp_2026_2.md
  - 1. Estructuras secuenciales y condicionales:
      - 1 Algoritmos y datos: S01_Algoritmos_Datos.ipynb
      - 2 Programación secuencial: S02_Programacion_Secuencial.ipynb
      - 3 Programación condicional: S03_Programacion_Condicional.ipynb
      - 4 Funciones y TDD: S04_Funciones_TDD.ipynb
      - 5 Evaluación de la Unidad I: S05_Evaluacion_Unidad_1.ipynb
  - 2. Estructuras repetitivas y operaciones algorítmicas:
      - 6 Estructuras repetitivas definidas: S06_Estructuras_Repetitivas_Definidas.ipynb
      - 7 Estructuras repetitivas condicionales: S07_Estructuras_Repetitivas_Condicionales.ipynb
      - 8 Ciclos, recursividad y procesamiento: S08_Ciclos_Recursividad_Procesamiento.ipynb
      - 9 Operaciones con arreglos: S09_Operaciones_Arreglos.ipynb
      - 10 Refactorización, optimización y persistencia: S10_Refactorizacion_Optimizacion_Persistencia.ipynb
      - 11 Evaluación de la Unidad II: S11_Evaluacion_Unidad_2.ipynb
  - 3. Estructuras de datos e integración del producto:
      - 12 Estructuras de datos estáticas: S12_Estructuras_Datos_Estaticas.ipynb
      - 13 Estructuras dinámicas lineales: S13_Estructuras_Dinamicas_Lineales.ipynb
      - 14 Árboles y grafos: S14_Arboles_Grafos.ipynb
      - 15 Sustentación del Proyecto Integrador: S15_Sustentacion_Proyecto_Integrador.ipynb
      - 16 Evaluación final: S16_Evaluacion_Final.ipynb
  - Anexos:
      - Guía algoritmo a código: S00_Guia_algoritmo_a_codigo.ipynb
      - Transición futura a Java 21: Anexo_Transicion_Java_21.ipynb
